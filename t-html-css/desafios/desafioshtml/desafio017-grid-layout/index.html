<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 1 - my version - Grid Layout</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            display: grid;
            grid-template-rows: 100px 50px 500px 1fr;
            grid-template-columns: 70% 1fr;
            gap: 10px;
            height: 100vh;
            width: 100vw;
        }

        header{
            grid-column: 1 / span 2;
            background-color: rgb(226, 46, 46);
        }
        nav{
            grid-column: 1 / span 2;
            background-color: rgb(46, 226, 46);
        }
        main{
            grid-column: 1/ 2;
            background-color: rgb(46, 46, 226);
        }
        aside{
            grid-column: 2 / 3;
            background-color: rgb(226, 226, 46);
        }
        footer{
            grid-column: 1 / 3;
            background-color: rgb(46, 226, 226);
        }
    </style>
</head>
<body>
    <header>
        Topo
    </header>
    <nav>
        Menu
    </nav>
    <main>
        Principal
    </main>
    <aside>
        Secundário
    </aside>
    <footer>
        Rodapé
    </footer>
</body>
</html>

 <!DOCTYPE html>
 <html lang="pt-br">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout na prática</title>
    <style>
        main.container{
            border: 3px solid #2cec83;
            

            display: grid;
            grid-template-columns: 100px 40% repeat(2,1fr); 
            grid-template-rows: repeat(3, 80px);
            grid-auto-rows: 80px;
            grid-auto-columns: 120px;
            grid-auto-flow: row;
           
            gap: 10px;

            /* align-items: normal; (stretch)
            justify-items: normal; (stretch)   

            align-content: normal; (stretch)
            justify-content: normal;
            (stretch)  

            */

            /* align-items: start;
            justify-items: center; */
            place-items: normal normal;

            /* align-content: space-between;
            justify-content: end; */
            place-content: normal normal;
            
        }
        div.item{
            border: 3px solid #c46142;
            padding: 10px;
        }
    </style>
 </head>
 <body>
    <main class="container">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item">E</div>
        <div class="item">F</div>
        <div class="item">G</div>
        <div class="item">H</div>
        <div class="item">I</div>
        <div class="item">J</div>
    </main>
 </body> 
 </html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner{
            background-color: lightsalmon;
    
            border-radius: 10px;
            margin-bottom: 20px;

            flex-flow: row nowrap;
            display: flex;
        }
        div.item{
            background-color: lightseagreen;
            border: 1px solid black;
           
            text-align: center;

        }

        div#cxA{
            /*flex-shrink: 1;
            flex-grow: 0;
            flex-basis: 150px;
             */

            flex: 0 1 150px;
        }
        div#cxB{
            /*flex-shrink: 0;
            flex-grow: 2;
            flex-basis: 150px;
             */

            flex: 2 0 150px;
        }
        div#cxC{
            /*flex-shrink: 2;
            flex-grow: 1;
            flex-basis: 150px;
            */

            flex: 1 2 150px;
        }

        div#cxD{
            /*flex: 0 1 auto;
            */

            flex:initial;
        }

        div#cxE{
            /*flex: 1 1 auto;
            */

            flex: auto;
        }

        div#cxF{
            /*flex: 0 0 auto;
            */

            flex: none;
        }

        div#cxG{
           /* flex: 3 1 auto;
           */

            flex:3;
        }



    </style>
</head>

<body>
    <div class="conteiner">
        <div class="item" id="cxA">A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>
    </div>

    <div class="conteiner">
        <div class="item" id="cxD">D</div>
        <div class="item" id="cxE">E</div>
        <div class="item" id="cxF">F</div>
    </div>

    <div class="conteiner">
        <div class="item" id="cxG">G</div>
        <div class="item" id="cxH">H</div>
        <div class="item" id="cxI">I</div>
    </div>
</body>

</html>

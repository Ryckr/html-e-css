<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner{
            background-color: lightsalmon;
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 20px;

            flex-flow: row nowrap;
            display: flex;
        }
        div.item{
            background-color: lightseagreen;
            border: 1px solid black;
            border-radius: 5px;
            text-align: center;

            margin: 0px 5px 0px 0px;

            flex-basis: 200px;
        }

        div#cxA{
            flex-shrink: 1;
            flex-grow: 0;
        }
        div#cxB{
            flex-shrink: 0;
            flex-grow: 2;
        }
        div#cxC{
            flex-shrink: 2;
            flex-grow: 1;
        }

        div#cxD{
            flex-shrink: 0;
            flex-grow: 2;
        }
        div#cxE{
            flex-shrink: 1;
            flex-grow: 0;
        }
        div#cxF{
            flex-shrink: 2;
            flex-grow: 1;
        }

        div#cxG{
            flex-shrink: 2;
            flex-grow: 0;
        }
        div#cxH{
            flex-shrink: 0;
            flex-grow: 3;
        }
        div#cxI{
            flex-shrink: 1;
            flex-grow: 1;
        }

    </style>
</head>

<body>
    <div class="conteiner">
        <div class="item" id="cxA">A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>
    </div>

    <div class="conteiner">
        <div class="item" id="cxD">D</div>
        <div class="item" id="cxE">E</div>
        <div class="item" id="cxF">F</div>
    </div>

    <div class="conteiner">
        <div class="item" id="cxG">G</div>
        <div class="item" id="cxH">H</div>
        <div class="item" id="cxI">I</div>
    </div>
</body>

</html>
